.nav-row { display:flex; gap:10px; width:100%; max-width:500px; padding:0 20px; margin-top:28px; }

.divider { width:100%; max-width:500px; height:1px; background:var(--border); margin:18px 0 0; }
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--azul); color:#fff; font-family:'Oswald',sans-serif; font-size:14px; padding:10px 28px; border-radius:30px; letter-spacing:1px; transition:transform 0.3s cubic-bezier(.21,1.02,.73,1); z-index:9999; pointer-events:none; white-space:nowrap; }

.loading { text-align:center; padding:30px; color:var(--muted); font-family:'Oswald',sans-serif; font-size:13px; letter-spacing:2px; }
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, getDocs, setDoc, updateDoc, deleteDoc,
         collection, query, orderBy, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyClQCeB0wyX12KcsSSgIT1pdvh3jTS20qA",
  authDomain: "padel-team-76749.firebaseapp.com",
  projectId: "padel-team-76749",
  storageBucket: "padel-team-76749.firebasestorage.app",
  messagingSenderId: "449257104174",
  appId: "1:449257104174:web:7f72b5d62c2d92813dd0bf"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── MOTOR DE FIXTURE ─────────────────────────────────────

function generarSlots(config) {
  const slots = [];
  config.dias.forEach(dia => {
    const [ah, am] = (dia.apertura||'09:00').split(':').map(Number);
    const slotMins = (config.duracion || 60) + (config.intervalo || 0);
    let n;
    if (dia.slots) {
      n = parseInt(dia.slots);
    } else if (dia.cierre) {
      const [ch, cm] = dia.cierre.split(':').map(Number);
      let cierreMin = ch * 60 + cm;
      if (cierreMin <= ah * 60 + am) cierreMin = 1440;
      n = Math.floor((cierreMin - (ah * 60 + am)) / slotMins);
    } else {
      n = 8;
    }
    let actual = ah * 60 + am;
    for (let s = 0; s < n; s++) {
      const hh = String(Math.floor(actual / 60) % 24).padStart(2, '0');
      const mn = String(actual % 60).padStart(2, '0');
      for (let c = 1; c <= (config.canchasDisponibles || 1); c++)
        slots.push({ dia: dia.fecha, hora: `${hh}:${mn}`, cancha: `CANCHA ${c}`, ocupado: false });
      actual += slotMins;
    }
  });
  return slots;
}

// Genera slots solo para los días indicados por índice
function generarSlotsDias(config, indicesDias) {
  const slots = [];
  config.dias.forEach((dia, idx) => {
    if (!indicesDias.includes(idx)) return;
    const [ah, am] = (dia.apertura||'09:00').split(':').map(Number);
    const slotMins = (config.duracion || 60) + (config.intervalo || 0);
    let n;
    if (dia.slots) {
      n = parseInt(dia.slots);
    } else if (dia.cierre) {
      const [ch, cm] = dia.cierre.split(':').map(Number);
      let cierreMin = ch * 60 + cm;
      if (cierreMin <= ah * 60 + am) cierreMin = 1440;
      n = Math.floor((cierreMin - (ah * 60 + am)) / slotMins);
    } else {
      n = 8;
    }
    let actual = ah * 60 + am;
    for (let s = 0; s < n; s++) {
      const hh = String(Math.floor(actual / 60) % 24).padStart(2, '0');
      const mn = String(actual % 60).padStart(2, '0');
      for (let c = 1; c <= (config.canchasDisponibles || 1); c++)
        slots.push({ dia: dia.fecha, hora: `${hh}:${mn}`, cancha: `CANCHA ${c}`, ocupado: false });
      actual += slotMins;
    }
  });
  return slots;
}

// Devuelve el nombre de una pareja dado su ID o etiqueta
function nombrePareja(id) {
  if (!id) return '?';
  const p = parejaMap[id];
  if (p && (p.j1Nombre || p.j2Nombre)) {
    return [p.j1Nombre, p.j2Nombre].filter(Boolean).join(' / ');
  }
  return id; // fallback al ID si no hay nombre
}

// Round Robin: genera todos los partidos entre un array de parejas (objetos o IDs)
function generarRoundRobin(parejas, zonaId) {
  const partidos = [];
  for (let i = 0; i < parejas.length; i++)
    for (let j = i+1; j < parejas.length; j++) {
      const id1 = parejas[i].id || parejas[i];
      const id2 = parejas[j].id || parejas[j];
      partidos.push({ fase:'zona', zonaId, pareja1Id: id1, pareja2Id: id2, estado:'pendiente', resultado:null });
    }
  return partidos;
}

// ── MOTOR DE FIXTURE INTELIGENTE ─────────────────────────

// Calcula slots disponibles de una pareja
function slotsDisponiblesPareja(pareja, slots) {
  return slots.filter(s => parejaDisponible(pareja, s)).length;
}

// Verifica si una pareja puede jugar en un slot
function parejaDisponible(pareja, slot) {
  const restr = pareja?.restricciones?.[slot.dia];
  if (!restr) return true;
  if (restr === 'bloqueado') return false;
  if (Array.isArray(restr)) {
    const [sh, sm] = slot.hora.split(':').map(Number);
    const inicioMin = sh * 60 + sm;
    const finMin    = inicioMin + (torneoConfig.duracion || 60);
    return !restr.some(h => {
      const [hh, mm] = h.split(':').map(Number);
      const hMin = hh * 60 + mm;
      return hMin >= inicioMin && hMin < finMin;
    });
  }
  return true;
}

// Calcula similitud de restricciones entre dos parejas (más alto = más compatibles)
function similitudRestricciones(p1, p2, slots) {
  let comunes = 0;
  slots.forEach(s => {
    const d1 = parejaDisponible(p1, s);
    const d2 = parejaDisponible(p2, s);
    if (d1 === d2) comunes++;
  });
  return comunes;
}

// Distribuye parejas en zonas priorizando compatibilidad horaria
function distribuirEnZonas(parejas, zonasConfig, slots) {
  const letras = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  
  // Ordenar parejas de MAYOR a MENOR restricción (las más restringidas primero)
  const parejasOrdenadas = [...parejas].sort((a, b) => {
    const slotsA = slotsDisponiblesPareja(a, slots);
    const slotsB = slotsDisponiblesPareja(b, slots);
    return slotsA - slotsB; // menos slots disponibles = más restringida = va primero
  });

  // Inicializar zonas vacías
  const zonas = zonasConfig.map((zc, zi) => ({
    id: `zona_${letras[zi] || 'Z'+zi}`,
    nombre: letras[zi] || 'Z'+zi,
    parejas: [],
    capacidad: zc.parejas,
    clasifican: zc.clasifican
  }));

  // Asignar cada pareja a la zona más compatible que tenga espacio
  parejasOrdenadas.forEach(pareja => {
    let mejorZona = null;
    let mejorScore = -1;

    zonas.forEach(zona => {
      if (zona.parejas.length >= zona.capacidad) return;
      
      if (zona.parejas.length === 0) {
        // Zona vacía — preferir zonas con más espacio
        const score = zona.capacidad;
        if (score > mejorScore) { mejorScore = score; mejorZona = zona; }
        return;
      }

      // Calcular compatibilidad promedio con parejas ya en esta zona
      let totalSim = 0;
      zona.parejas.forEach(p => {
        totalSim += similitudRestricciones(pareja, p, slots);
      });
      const score = totalSim / zona.parejas.length;
      if (score > mejorScore) { mejorScore = score; mejorZona = zona; }
    });

    if (mejorZona) mejorZona.parejas.push(pareja);
  });

  return zonas;
}

// Asigna horarios respetando descanso mínimo entre partidos
function asignarHorarios(partidos, slots, pMap) {
  const resultado = [];
  const slotsLibres = slots.map(s => ({...s}));
  const ocupCancha = {};
  // Guarda los slots usados por cada pareja para calcular descanso
  const ultimoSlotPareja = {}; // parejaId -> { dia, horaMin }
  const slotMins = (torneoConfig.duracion || 60) + (torneoConfig.intervalo || 0);
  const DESCANSO_IDEAL = 3; // slots de descanso ideal (3 * slotMins)
  const DESCANSO_MIN   = 1; // slots de descanso mínimo

  // Ordenar partidos: primero los que involucran parejas más restringidas
  const partidosOrdenados = [...partidos].sort((a, b) => {
    const p1a = pMap[a.pareja1Id], p1b = pMap[b.pareja1Id];
    const p2a = pMap[a.pareja2Id], p2b = pMap[b.pareja2Id];
    const slotsA = slotsDisponiblesPareja(p1a, slots) + slotsDisponiblesPareja(p2a, slots);
    const slotsB = slotsDisponiblesPareja(p1b, slots) + slotsDisponiblesPareja(p2b, slots);
    return slotsA - slotsB; // los más restringidos primero
  });

  function horaAMin(hora) {
    const [h, m] = hora.split(':').map(Number);
    return h * 60 + m;
  }

  function descansoSuficiente(parejaId, slot, minSlots) {
    const ultimo = ultimoSlotPareja[parejaId];
    if (!ultimo) return true;
    if (ultimo.dia !== slot.dia) return true; // días distintos = siempre OK
    const diff = (horaAMin(slot.hora) - ultimo.horaMin) / slotMins;
    return diff >= minSlots;
  }

  function intentarAsignar(partido, descansoRequerido) {
    const p1 = pMap[partido.pareja1Id], p2 = pMap[partido.pareja2Id];
    
    for (const slot of slotsLibres) {
      if (slot.ocupado) continue;
      const clave = `${slot.dia}|${slot.hora}`;
      const cc = `${clave}|${slot.cancha}`;
      if (ocupCancha[cc]) continue;
      // Verificar que ninguna pareja ya juega en ese día+hora
      const claveBase = `${slot.dia}|${slot.hora}`;
      if (Object.keys(ultimoSlotPareja).some(pid => 
        (pid === partido.pareja1Id || pid === partido.pareja2Id) && 
        ultimoSlotPareja[pid]?.clave === claveBase)) continue;
      
      if (!descansoSuficiente(partido.pareja1Id, slot, descansoRequerido)) continue;
      if (!descansoSuficiente(partido.pareja2Id, slot, descansoRequerido)) continue;
      
      const disp1 = parejaDisponible(p1, slot);
      const disp2 = parejaDisponible(p2, slot);
      if (!disp1 || !disp2) continue;
      
      return { slot, conflicto: false };
    }
    return null;
  }

  partidosOrdenados.forEach(partido => {
    const p1 = pMap[partido.pareja1Id], p2 = pMap[partido.pareja2Id];
    let asignacion = null;
    let conflicto = false;

    // Intentar con descanso ideal primero, luego mínimo, luego sin restricción
    asignacion = intentarAsignar(partido, DESCANSO_IDEAL);
    if (!asignacion) asignacion = intentarAsignar(partido, DESCANSO_MIN);
    
    // Si no hay slot con descanso, buscar cualquier slot disponible
    if (!asignacion) {
      for (const slot of slotsLibres) {
        if (slot.ocupado) continue;
        const cc = `${slot.dia}|${slot.hora}|${slot.cancha}`;
        if (ocupCancha[cc]) continue;
        const disp1 = parejaDisponible(p1, slot);
        const disp2 = parejaDisponible(p2, slot);
        if (disp1 && disp2) { asignacion = { slot, conflicto: false }; break; }
      }
    }

    // Último recurso: slot con conflicto de restricción
    if (!asignacion) {
      for (const slot of slotsLibres) {
        if (slot.ocupado) continue;
        const cc = `${slot.dia}|${slot.hora}|${slot.cancha}`;
        if (ocupCancha[cc]) continue;
        asignacion = { slot, conflicto: true };
        break;
      }
    }

    if (asignacion) {
      const { slot } = asignacion;
      slot.ocupado = true;
      const cc = `${slot.dia}|${slot.hora}|${slot.cancha}`;
      ocupCancha[cc] = true;
      const horaMin = horaAMin(slot.hora);
      ultimoSlotPareja[partido.pareja1Id] = { dia: slot.dia, horaMin, clave: `${slot.dia}|${slot.hora}` };
      ultimoSlotPareja[partido.pareja2Id] = { dia: slot.dia, horaMin, clave: `${slot.dia}|${slot.hora}` };
      resultado.push({...partido, dia: slot.dia, hora: slot.hora, cancha: slot.cancha, conflicto: asignacion.conflicto });
    } else {
      resultado.push({...partido, dia: null, hora: null, cancha: null, conflicto: true});
    }
  });

  // Reordenar resultado por orden original de partidos
  return partidos.map(p => resultado.find(r => r.pareja1Id === p.pareja1Id && r.pareja2Id === p.pareja2Id) || {...p, conflicto:true});
}

// ── ESTADO ───────────────────────────────────────────────
let DIAS = [], HORAS = [], CANCHAS = [];
let fixture = [];
let zonasData = [];
let parejaMap = {};  // mapa global id→pareja
let diaActivo = 0;
let partidoSeleccionado = null;
let torneoConfig = null;

// ── CARGA INICIAL ────────────────────────────────────────
async function cargarYGenerar() {
  const torneoId = sessionStorage.getItem('torneoId');
  if (!torneoId) { showToast('⚠️ No hay torneo activo'); return; }

  showToast('Cargando datos...');

  const tSnap = await getDoc(doc(db,'torneos',torneoId));
  if (!tSnap.exists()) { showToast('⚠️ Torneo no encontrado'); return; }
  torneoConfig = { id:torneoId, ...tSnap.data() };

  document.getElementById('torneoSubtitulo').textContent = torneoConfig.nombre;

  const formatoLabel = {
    round_robin:       'ROUND ROBIN',
    round_robin_llave: `ROUND ROBIN + LLAVE (top ${torneoConfig.clasificadosLlave||4})`
  };
  document.getElementById('res-formato').textContent = formatoLabel[torneoConfig.formato] || torneoConfig.formato?.toUpperCase() || '—';

  const pSnap = await getDocs(collection(db,'torneos',torneoId,'parejas'));
  const parejas = pSnap.docs.map(d => ({id:d.id,...d.data()})).sort((a,b) => (a.seed||0)-(b.seed||0));
  console.log('Parejas cargadas:', parejas.length, 'Formato:', torneoConfig.formato, 'ZonasConfig:', JSON.stringify(torneoConfig.zonasConfig));

  // Ver si ya hay fixture confirmado
  const metaSnap = await getDoc(doc(db,'torneos',torneoId,'fixture','meta'));
  if (metaSnap.exists() && metaSnap.data().confirmado) {
    const pSnap2 = await getDocs(query(collection(db,'torneos',torneoId,'partidos'),orderBy('orden')));
    fixture = pSnap2.docs.map(d => ({id:d.id,...d.data()}));
  } else {
    generarFixture(parejas);
  }

  DIAS = torneoConfig.dias.map(d => {
    const fecha = new Date(d.fecha+'T12:00:00');
    const label = fecha.toLocaleDateString('es-AR',{weekday:'short',day:'2-digit',month:'2-digit'}).toUpperCase();
    return { label, fecha:d.fecha };
  });
  const slots = generarSlots(torneoConfig);
  HORAS   = [...new Set(slots.map(s=>s.hora))];
  CANCHAS = [...new Set(slots.map(s=>s.cancha))];

  renderTabs();
  renderFixture();
  showToast('');
}

function generarFixture(parejas) {
  const formato = torneoConfig.formato || 'round_robin';
  parejaMap = {};
  parejas.forEach(p => { parejaMap[p.id] = p; });
  const slots = generarSlots(torneoConfig);
  const dias = torneoConfig.dias || [];
  const ultimoDia = dias.length > 1 ? dias[dias.length - 1].fecha : null;
  const slotsZonas = ultimoDia ? slots.filter(s => s.dia !== ultimoDia) : slots;
  const slotsLlave = ultimoDia ? slots.filter(s => s.dia === ultimoDia) : slots;
  let partidos = [];

  if (formato === 'zonas_llave') {
    const zonasConfig = torneoConfig.zonasConfig;
    console.log('zonasConfig length:', zonasConfig?.length, 'parejas.length:', parejas.length);
    if (zonasConfig?.length > 0) {
      // Distribuir según compatibilidad horaria
      const zonas = distribuirEnZonas(parejas, zonasConfig, slotsZonas);
      zonasData = zonas.map(z => ({...z, parejas: z.parejas.map(p => p.id || p)}));
      zonas.forEach(zona => {
        partidos.push(...generarRoundRobin(zona.parejas, zona.id));
      });
    } else {
      // Sin zonasConfig — distribuir en grupos de 4 por compatibilidad
      const porZona = 4;
      const nZonas = Math.ceil(parejas.length / porZona);
      const zonasConfigAuto = Array.from({length: nZonas}, () => ({ parejas: porZona, clasifican: 2 }));
      const zonas = distribuirEnZonas(parejas, zonasConfigAuto, slotsZonas);
      zonasData = zonas;
      zonas.forEach(zona => {
        partidos.push(...generarRoundRobin(zona.parejas, zona.id));
      });
    }
  } else {
    // Round robin zona única
    zonasData = [{ id:'zona_A', nombre:'A', parejas: parejas.map(p => p.id) }];
    partidos  = generarRoundRobin(parejas, 'zona_A');
  }

  fixture = asignarHorarios(partidos, slotsZonas, parejaMap);
  console.log('Partidos zona:', partidos.length, 'Slots zona:', slotsZonas.length, 'Fixture:', fixture.length);
  fixture.forEach((p,i) => { p.id = `partido_${String(i+1).padStart(3,'0')}`; p.orden = i+1; });

  // Para zonas_llave agregar eliminatorios asignados al último día
  if (formato === 'zonas_llave') {
    const totalClasif = zonasData.reduce((s, z) => s + (z.clasifican || 2), 0);
    const rondas = generarRondasEliminatoria(totalClasif);
    let ordenBase = fixture.length;
    // Asignar slots del último día a los eliminatorios
    const slotsLlaveLibres = slotsLlave.map(s => ({...s}));
    let slotIdx = 0;
    rondas.forEach(ronda => {
      ronda.partidos.forEach(p => {
        ordenBase++;
        // Asignar slot del último día si hay disponible
        let slotAsig = null;
        while (slotIdx < slotsLlaveLibres.length) {
          const s = slotsLlaveLibres[slotIdx];
          if (!s.ocupado) { s.ocupado = true; slotAsig = s; slotIdx++; break; }
          slotIdx++;
        }
        fixture.push({
          id:        `partido_${String(ordenBase).padStart(3,'0')}`,
          fase:      ronda.fase,
          zonaId:    null,
          pareja1Id: p.p1Label,
          pareja2Id: p.p2Label,
          estado:    'pendiente',
          resultado: null,
          esLlave:   true,
          llavePos:  p.pos,
          dia:       slotAsig?.dia || null,
          hora:      slotAsig?.hora || null,
          cancha:    slotAsig?.cancha || null,
          conflicto: false,
          orden:     ordenBase
        });
      });
    });
  }

  // Si es round_robin_llave, agregar placeholders de eliminatoria AL FINAL
  if (formato === 'round_robin_llave') {
    const n = torneoConfig.clasificadosLlave || 4;
    const rondas = generarRondasEliminatoria(n);
    let ordenBase = fixture.length;
    rondas.forEach(ronda => {
      ronda.partidos.forEach(p => {
        ordenBase++;
        fixture.push({
          id:       `partido_${String(ordenBase).padStart(3,'0')}`,
          fase:     ronda.fase,
          zonaId:   null,
          pareja1Id: p.p1Label,
          pareja2Id: p.p2Label,
          estado:   'pendiente',
          resultado: null,
          esLlave:  true,
          llavePos: p.pos,
          dia:      null,
          hora:     null,
          cancha:   null,
          conflicto: false,
          orden:    ordenBase
        });
      });
    });
  }
}

// Genera la estructura de rondas para una llave de n equipos (n debe ser potencia de 2)
function generarRondasEliminatoria(n) {
  const nombres = {2:'final', 4:'semifinal', 8:'cuartos', 16:'octavos'};
  const rondas = [];
  let equipos = n;
  while (equipos >= 2) {
    const fase = nombres[equipos] || `ronda_${equipos}`;
    const partidos = [];
    for (let i = 1; i <= equipos/2; i++) {
      partidos.push({
        pos:    i,
        p1Label: equipos === n ? `Clasificado ${i*2-1}°` : `Ganador partido ${fase}_${i*2-1}`,
        p2Label: equipos === n ? `Clasificado ${i*2}°`   : `Ganador partido ${fase}_${i*2}`
      });
    }
    rondas.push({ fase, partidos });
    equipos = equipos / 2;
  }
  return rondas;
}

// ── RENDER TABS ──────────────────────────────────────────
window.renderTabs = function() {
  const wrap = document.getElementById('diasTabs');
  if (!wrap) return;
  const hayLlave = fixture.some(p => p.esLlave);
  wrap.innerHTML = DIAS.map((d,i) =>
    `<button class="dia-tab ${i===diaActivo?'activa':''}" onclick="selDia(${i})">${d.label}</button>`
  ).join('') + (hayLlave ? `<button class="dia-tab ${diaActivo===999?'activa':''}" onclick="selDia(999)" style="border-color:rgba(240,180,41,0.4);${diaActivo===999?'background:rgba(240,180,41,0.1);border-color:var(--amarillo);color:var(--amarillo)':''}">🏆 LLAVE</button>` : '');
};

window.selDia = function(i) { diaActivo=i; renderTabs(); renderFixture(); };

// ── RENDER FIXTURE ───────────────────────────────────────
window.renderFixture = function() {
  const wrap = document.getElementById('fixtureWrap');
  if (!wrap) return;

  const conflictos = fixture.filter(p => p.conflicto && !p.esLlave).length;
  const partLlave  = fixture.filter(p => p.esLlave).length;
  const partRR     = fixture.length - partLlave;
  document.getElementById('res-partidos').textContent  = partLlave > 0 ? `${partRR} RR + ${partLlave} llave` : fixture.length;
  document.getElementById('res-conflictos').textContent = conflictos;
  const el = document.getElementById('res-estado');
  if (conflictos === 0) { el.textContent='✓ LISTO'; el.className='resumen-val ok'; }
  else { el.textContent=`⚠ ${conflictos} CONFLICTO(S)`; el.className='resumen-val warn'; }

  const diaFecha = DIAS[diaActivo]?.fecha;
  const partidos = diaActivo === 999
    ? fixture.filter(p => p.esLlave)
    : fixture.filter(p => p.dia === diaFecha);
  wrap.innerHTML = '';

  if (partidos.length === 0) {
    wrap.innerHTML = '<div class="loading">Sin partidos este día</div>';
    return;
  }

  const fasesLlave = { final:'FINAL', semifinal:'SEMIFINAL', cuartos:'CUARTOS DE FINAL', octavos:'OCTAVOS DE FINAL' };

  partidos
    .sort((a,b) => (a.hora||'99:99').localeCompare(b.hora||'99:99')||(a.cancha||'').localeCompare(b.cancha||''))
    .forEach(p => {
      const fmt = torneoConfig?.formato || '';
      let zonaLabel;
      if (p.esLlave) {
        zonaLabel = fasesLlave[p.fase] || p.fase?.toUpperCase() || 'LLAVE';
      } else if (fmt === 'round_robin' || fmt === 'round_robin_llave') {
        zonaLabel = `Round Robin · ${p.cancha||''}`;
      } else {
        zonaLabel = `${(p.fase||'').toUpperCase()} · ${p.cancha||''}`;
      }
      const card = document.createElement('div');
      card.className = 'partido-card' + (p.conflicto?' conflicto':'') + (p.esLlave?' llave-placeholder':'');
      card.innerHTML = `
        <div class="partido-header">
          <div class="partido-hora" style="${p.esLlave?'font-size:14px;color:var(--muted);padding-top:4px;':''}">
            ${p.esLlave ? '⏳ S/H' : (p.hora||'--:--')}
          </div>
          <div class="partido-info">
            <div class="partido-zona">${zonaLabel}</div>
            <div class="partido-parejas" style="${p.esLlave?'color:var(--muted);font-style:italic;':''}">
              ${nombrePareja(p.pareja1Id)} <span style="color:var(--muted)">vs</span> ${nombrePareja(p.pareja2Id)}
            </div>
          </div>
          <div class="partido-acciones">
            ${p.esLlave ? '<span style="font-size:11px;color:var(--muted);font-family:Oswald,sans-serif;letter-spacing:1px;">SE ASIGNA<br>DESPUÉS</span>' 
              : `<button class="btn-mover" onclick="abrirModal('${p.id||p.orden}')" title="Cambiar horario">⇄</button>`}
          </div>
        </div>
        ${p.conflicto?'<span class="conflicto-badge">⚠ Restricción horaria</span>':''}`;
      wrap.appendChild(card);
    });
};

// ── MODAL MOVER ──────────────────────────────────────────
window.abrirModal = function(id) {
  partidoSeleccionado = fixture.find(p => (p.id||p.orden)==id || String(p.id||p.orden)===String(id));
  if (!partidoSeleccionado) return;
  document.getElementById('modalSub').textContent = `${partidoSeleccionado.pareja1Id||'?'} vs ${partidoSeleccionado.pareja2Id||'?'}`;
  const opciones = document.getElementById('modalOpciones');
  opciones.innerHTML = '';
  HORAS.forEach(hora => {
    CANCHAS.forEach(cancha => {
      const ocupado = fixture.some(p =>
        p.dia===DIAS[diaActivo]?.fecha && p.hora===hora && p.cancha===cancha &&
        (p.id||p.orden) !== (partidoSeleccionado.id||partidoSeleccionado.orden)
      );
      const esActual = hora===partidoSeleccionado.hora && cancha===partidoSeleccionado.cancha;
      const div = document.createElement('div');
      div.className = 'modal-opcion' + (ocupado?' ocupado':'');
      div.innerHTML = `
        <div class="modal-opcion-hora">${hora}</div>
        <div class="modal-opcion-cancha">${cancha}</div>
        <div class="modal-opcion-estado ${ocupado?'ocupado-badge':'libre-badge'}">${esActual?'← ACTUAL':ocupado?'OCUPADO':'LIBRE'}</div>`;
      if (!ocupado && !esActual) div.onclick = () => moverPartido(hora, cancha);
      opciones.appendChild(div);
    });
  });
  document.getElementById('modalOverlay').classList.add('visible');
};

window.cerrarModal = function() { document.getElementById('modalOverlay').classList.remove('visible'); };

window.moverPartido = function(hora, cancha) {
  if (!partidoSeleccionado) return;
  const p = fixture.find(x => (x.id||x.orden)===(partidoSeleccionado.id||partidoSeleccionado.orden));
  if (p) { p.hora=hora; p.cancha=cancha; p.conflicto=false; }
  cerrarModal(); renderFixture(); showToast('✓ Partido movido');
};

// ── RESETEAR FIXTURE ─────────────────────────────────────
window.resetearFixture = async function() {
  if (!confirm('¿Resetear el fixture? Las parejas y sus restricciones se mantienen. Solo se borran los partidos y zonas generados.')) return;

  const torneoId = sessionStorage.getItem('torneoId');
  if (!torneoId) return;

  showToast('Reseteando...');
  try {
    // Borrar partidos existentes
    const partidosSnap = await getDocs(collection(db, 'torneos', torneoId, 'partidos'));
    await Promise.all(partidosSnap.docs.map(d => deleteDoc(doc(db, 'torneos', torneoId, 'partidos', d.id))));

    // Borrar zonas existentes
    const zonasSnap = await getDocs(collection(db, 'torneos', torneoId, 'zonas'));
    await Promise.all(zonasSnap.docs.map(d => deleteDoc(doc(db, 'torneos', torneoId, 'zonas', d.id))));

    // Borrar meta del fixture
    await deleteDoc(doc(db, 'torneos', torneoId, 'fixture', 'meta')).catch(() => {});

    // Volver el torneo a borrador
    await updateDoc(doc(db, 'torneos', torneoId), { estado: 'borrador', actualizadoEn: serverTimestamp() });

    showToast('✓ Fixture reseteado');
    setTimeout(() => location.reload(), 1200);
  } catch(e) {
    console.error(e);
    showToast('❌ Error al resetear');
  }
};

// ── CONFIRMAR ────────────────────────────────────────────
window.confirmarFixture = async function() {
  // Validación 1: verificar slots suficientes
  const totalPartidos = fixture.filter(p => !p.esLlave).length;
  const totalSlots = generarSlots(torneoConfig).length;
  if (totalPartidos === 0) {
    showToast('⚠️ No hay partidos generados. Revisá la configuración en P2.');
    return;
  }

  // Validación 2: verificar partidos sin horario asignado
  const sinHorario = fixture.filter(p => !p.esLlave && !p.dia).length;
  if (sinHorario > 0) {
    const continuar = confirm(`⚠️ ${sinHorario} partido(s) no tienen horario asignado por falta de slots.\n\nPodés volver a P2 para agregar más slots, o confirmar igual.`);
    if (!continuar) return;
  }

  // Validación 3: conflictos de horario
  const conflictos = fixture.filter(p => p.conflicto && !p.esLlave).length;
  if (conflictos > 0 && !confirm(`Hay ${conflictos} conflicto(s) de horario con restricciones de parejas. ¿Confirmar igual?`)) return;

  const torneoId = sessionStorage.getItem('torneoId');
  if (!torneoId) { showToast('⚠️ No hay torneo activo'); return; }

  showToast('Guardando fixture...');
  try {
    // 1. Guardar partidos de zona
    await Promise.all(fixture.map((p,i) => {
      const id = `partido_${String(i+1).padStart(3,'0')}`;
      return setDoc(doc(db,'torneos',torneoId,'partidos',id), {...p, orden:i+1, id});
    }));

    // 2. GUARDAR ZONAS
    await Promise.all(zonasData.map(z =>
      setDoc(doc(db,'torneos',torneoId,'zonas', z.id), {
        nombre:     z.nombre,
        parejas:    z.parejas,
        clasifican: z.clasifican || 2
      })
    ));

    // 3. Meta del fixture
    await setDoc(doc(db,'torneos',torneoId,'fixture','meta'), {
      confirmado:   true,
      confirmadoEn: serverTimestamp(),
      formato:      torneoConfig.formato,
      totalZonas:   zonasData.length
    });

    // 4. Actualizar estado del torneo
    await updateDoc(doc(db,'torneos',torneoId), {
      estado: 'activo',
      actualizadoEn: serverTimestamp()
    });

    showToast('✓ Fixture confirmado');
    setTimeout(() => { window.location.href = 'torneo_resultados.html'; }, 1200);
  } catch(e) {
    console.error(e);
    showToast('❌ Error al guardar: ' + e.message);
  }
};

function showToast(msg) {
  const t = document.getElementById('toast');
  if (!msg) { t.classList.remove('show'); return; }
  t.textContent = msg; t.classList.add('show');
  if (!msg.includes('...') && !msg.startsWith('C')) setTimeout(() => t.classList.remove('show'), 2500);
}

cargarYGenerar();
</script>
