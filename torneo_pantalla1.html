<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Padel Team — Configuración</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;600&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --azul:     #4a9eff;
  --azul-dark:#1a3a6e;
  --cyan:     #00d4ff;
  --bg:       #0a0a0f;
  --bg2:      #111118;
  --bg3:      #18181f;
  --border:   #222230;
  --text:     #e0e0f0;
  --muted:    #555570;
  --label:    #7a7a99;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 0 60px;
}

/* ── HEADER ── */
.app-header {
  width: 100%;
  background: linear-gradient(180deg, #0d0d16 0%, var(--bg) 100%);
  border-bottom: 1px solid var(--border);
  padding: 18px 20px 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  position: relative;
}
.header-back {
  position: absolute;
  left: 16px;
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 10px;
  color: var(--muted);
  font-family: 'Oswald', sans-serif;
  font-size: 12px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.2s;
}
.header-back:hover { border-color: var(--azul); color: var(--azul); }
.app-header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--azul), var(--cyan), var(--azul), transparent);
}
.header-logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 6px; color: #fff; }
.header-logo span { color: var(--azul); }

/* ── STEP INDICATOR ── */
.steps {
  display: flex;
  align-items: center;
  gap: 0;
  width: 100%;
  max-width: 500px;
  padding: 20px 20px 4px;
}
.step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  flex: 1;
  position: relative;
}
.step:not(:last-child)::after {
  content: '';
  position: absolute;
  top: 14px; left: 55%; right: -45%;
  height: 1px;
  background: var(--border);
}
.step.active:not(:last-child)::after { background: var(--azul); }
.step-num {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  border: 1.5px solid var(--border);
  color: var(--muted);
  background: var(--bg2);
  z-index: 1;
}
.step.active .step-num {
  background: var(--azul);
  border-color: var(--azul);
  color: #fff;
  box-shadow: 0 0 14px rgba(74,158,255,0.5);
}
.step-label {
  font-family: 'Oswald', sans-serif;
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
}
.step.active .step-label { color: var(--azul); }

/* ── PÁGINA TITLE ── */
.page-title {
  width: 100%;
  max-width: 500px;
  padding: 20px 20px 6px;
}
.page-title h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  letter-spacing: 4px;
  color: #fff;
  line-height: 1;
}
.page-title p {
  font-size: 13px;
  color: var(--label);
  letter-spacing: 1px;
  margin-top: 4px;
}

/* ── SECCIONES ── */
.section {
  width: 100%;
  max-width: 500px;
  padding: 16px 20px 0;
}
.section-label {
  font-family: 'Oswald', sans-serif;
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--azul);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-label::after {
  content: '';
  flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--border), transparent);
}

/* ── LOGO UPLOAD ── */
.logo-upload {
  display: flex;
  align-items: center;
  gap: 16px;
  background: var(--bg3);
  border: 1.5px dashed var(--border);
  border-radius: 12px;
  padding: 16px;
  cursor: pointer;
  transition: border-color 0.2s;
  margin-bottom: 12px;
}
.logo-upload:hover { border-color: var(--azul); }
.logo-preview {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: var(--bg2);
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  flex-shrink: 0;
}
.logo-preview img { width: 100%; height: 100%; object-fit: contain; display: none; }
.logo-preview .placeholder { font-size: 26px; }
.logo-upload-text h4 {
  font-family: 'Oswald', sans-serif;
  font-size: 14px;
  letter-spacing: 2px;
  color: #fff;
  margin-bottom: 2px;
}
.logo-upload-text p { font-size: 12px; color: var(--muted); }
#logoInput { display: none; }

/* ── COLOR PICKER ── */
.color-row {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.color-item {
  flex: 1;
  min-width: 120px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.color-item label {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--label);
  flex: 1;
}
.color-item input[type="color"] {
  width: 32px; height: 32px;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  padding: 0;
  background: none;
  flex-shrink: 0;
}

/* ── INPUTS ── */
.field { margin-bottom: 10px; }
.field label {
  display: block;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--label);
  margin-bottom: 5px;
}
.field input, .field select {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text);
  font-family: 'Oswald', sans-serif;
  font-size: 15px;
  letter-spacing: 1px;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
.field input:focus, .field select:focus { border-color: var(--azul); }
.field input::placeholder { color: var(--muted); }
.field select option { background: #1a1a2a; }

.field-row { display: flex; gap: 10px; }
.field-row .field { flex: 1; }

/* ── REDES SOCIALES ── */
.red-social {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  margin-bottom: 8px;
  transition: border-color 0.2s;
}
.red-social:focus-within { border-color: var(--azul); }
.red-social .icon {
  font-size: 18px;
  flex-shrink: 0;
  width: 28px;
  text-align: center;
}
.red-social input {
  flex: 1;
  background: none;
  border: none;
  color: var(--text);
  font-family: 'Oswald', sans-serif;
  font-size: 14px;
  letter-spacing: 1px;
  outline: none;
}
.red-social input::placeholder { color: var(--muted); }

/* ── TELÉFONOS ── */
.tel-row {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
  align-items: center;
}
.tel-row input {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px 14px;
  color: var(--text);
  font-family: 'Oswald', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.tel-row input:focus { border-color: var(--azul); }
.tel-row input::placeholder { color: var(--muted); }
.tel-label {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--label);
  width: 36px;
  text-align: right;
  flex-shrink: 0;
}
.btn-add-tel {
  background: none;
  border: 1px dashed var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  color: var(--muted);
  font-family: 'Oswald', sans-serif;
  font-size: 12px;
  letter-spacing: 2px;
  cursor: pointer;
  width: 100%;
  text-align: center;
  transition: all 0.2s;
  margin-bottom: 4px;
}
.btn-add-tel:hover { border-color: var(--azul); color: var(--azul); }

/* ── ZONA / IDIOMA / MONEDA ── */
.config-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

/* ── BTN SIGUIENTE ── */
.btn-siguiente {
  width: 100%;
  max-width: 500px;
  margin: 28px 20px 0;
  padding: 16px;
  background: var(--azul);
  border: none;
  border-radius: 12px;
  color: #fff;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 3px;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s, box-shadow 0.2s;
  box-shadow: 0 4px 24px rgba(74,158,255,0.3);
}
.btn-siguiente:active { transform: scale(0.98); opacity: 0.9; }
.btn-siguiente:hover { box-shadow: 0 4px 32px rgba(74,158,255,0.5); }

/* ── SEPARADOR ── */
.divider { width: 100%; max-width: 500px; height: 1px; background: var(--border); margin: 18px 0 0; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--azul); color: #fff;
  font-family: 'Oswald', sans-serif; font-size: 14px;
  padding: 10px 28px; border-radius: 30px; letter-spacing: 1px;
  transition: transform 0.3s cubic-bezier(.21,1.02,.73,1);
  z-index: 9999; pointer-events: none; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

</style>
</head>
<body>

<!-- HEADER -->
<div class="app-header">
  <button class="header-back" onclick="window.location.href='index.html'">← INICIO</button>
  <div class="header-logo">PADEL <span>TEAM</span> · TORNEOS</div>
</div>

<!-- STEPS -->
<div class="steps">
  <div class="step active">
    <div class="step-num">1</div>
    <div class="step-label">Cancha</div>
  </div>
  <div class="step">
    <div class="step-num">2</div>
    <div class="step-label">Torneo</div>
  </div>
  <div class="step">
    <div class="step-num">3</div>
    <div class="step-label">Parejas</div>
  </div>
  <div class="step">
    <div class="step-num">4</div>
    <div class="step-label">Revisión</div>
  </div>
  <div class="step">
    <div class="step-num">5</div>
    <div class="step-label">Informes</div>
  </div>
</div>

<!-- TITLE -->
<div class="page-title">
  <h2>Configuración de la cancha</h2>
  <p>Estos datos se usarán en todos tus torneos</p>
</div>

<!-- SECCIÓN: IDENTIDAD -->
<div class="section">
  <div class="section-label">Identidad</div>

  <div class="logo-upload" onclick="document.getElementById('logoInput').click()">
    <div class="logo-preview" id="logoPreview">
      <img id="logoImg" src="" alt="logo">
      <span class="placeholder" id="logoPlaceholder">🎾</span>
    </div>
    <div class="logo-upload-text">
      <h4>Subir logo</h4>
      <p>PNG o JPG recomendado · Fondo transparente</p>
    </div>
  </div>
  <input type="file" id="logoInput" accept="image/*">

  <div class="field">
    <label>Nombre de la cancha</label>
    <input type="text" placeholder="Ej: Padel Team Guaminí" id="nombreCancha">
  </div>

  <div class="color-row">
    <div class="color-item">
      <label>Color principal</label>
      <input type="color" id="colorPrincipal" value="#4a9eff">
    </div>
    <div class="color-item">
      <label>Color secundario</label>
      <input type="color" id="colorSecundario" value="#00d4ff">
    </div>
  </div>
</div>

<!-- SECCIÓN: CONTACTO -->
<div class="section">
  <div class="section-label">Contacto</div>

  <div id="telefonos">
    <div class="tel-row">
      <span class="tel-label">TEL 1</span>
      <input type="tel" placeholder="Nombre y teléfono...">
    </div>
    <div class="tel-row">
      <span class="tel-label">TEL 2</span>
      <input type="tel" placeholder="Nombre y teléfono...">
    </div>
  </div>
  <button class="btn-add-tel" onclick="agregarTel()">+ AGREGAR TELÉFONO</button>

  <div class="red-social">
    <span class="icon">📸</span>
    <input type="text" placeholder="Instagram  @usuario">
  </div>
  <div class="red-social">
    <span class="icon">💬</span>
    <input type="text" placeholder="WhatsApp  +54 ...">
  </div>
  <div class="red-social">
    <span class="icon">📘</span>
    <input type="text" placeholder="Facebook  página o usuario">
  </div>
</div>

<!-- SECCIÓN: REGIONAL -->
<div class="section">
  <div class="section-label">Regional</div>
  <div class="config-grid">
    <div class="field">
      <label>País</label>
      <select id="pais">
        <option value="AR">🇦🇷 Argentina</option>
        <option value="ES">🇪🇸 España</option>
        <option value="MX">🇲🇽 México</option>
        <option value="UY">🇺🇾 Uruguay</option>
        <option value="CL">🇨🇱 Chile</option>
      </select>
    </div>
    <div class="field">
      <label>Moneda</label>
      <select id="moneda">
        <option value="ARS">$ ARS</option>
        <option value="EUR">€ EUR</option>
        <option value="USD">$ USD</option>
        <option value="MXN">$ MXN</option>
        <option value="UYU">$ UYU</option>
      </select>
    </div>
    <div class="field">
      <label>Zona horaria</label>
      <select id="zona">
        <option value="America/Argentina/Buenos_Aires">UTC-3 Buenos Aires</option>
        <option value="Europe/Madrid">UTC+1 Madrid</option>
        <option value="America/Mexico_City">UTC-6 Ciudad de México</option>
        <option value="America/Montevideo">UTC-3 Montevideo</option>
        <option value="America/Santiago">UTC-4 Santiago</option>
      </select>
    </div>
    <div class="field">
      <label>Idioma</label>
      <select id="idioma">
        <option value="es">Español</option>
        <option value="en">English</option>
        <option value="pt">Português</option>
      </select>
    </div>
  </div>
</div>

<div class="divider"></div>

<!-- BOTÓN SIGUIENTE -->
<div style="width:100%;max-width:500px;padding:0 20px;">
  <button class="btn-siguiente" onclick="guardarYSeguir()">SIGUIENTE → CREAR TORNEO</button>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyClQCeB0wyX12KcsSSgIT1pdvh3jTS20qA",
  authDomain: "padel-team-76749.firebaseapp.com",
  projectId: "padel-team-76749",
  storageBucket: "padel-team-76749.firebasestorage.app",
  messagingSenderId: "449257104174",
  appId: "1:449257104174:web:7f72b5d62c2d92813dd0bf"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── LOGO PREVIEW ──
document.getElementById('logoInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    document.getElementById('logoImg').src = ev.target.result;
    document.getElementById('logoImg').style.display = 'block';
    document.getElementById('logoPlaceholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
});

// ── AGREGAR TELÉFONO ──
window.agregarTel = function() {
  const wrap = document.getElementById('telefonos');
  const n = wrap.children.length + 1;
  const row = document.createElement('div');
  row.className = 'tel-row';
  row.innerHTML = `<span class="tel-label">TEL ${n}</span><input type="tel" placeholder="Nombre y teléfono...">`;
  wrap.appendChild(row);
};

// ── GUARDAR Y SEGUIR ──
window.guardarYSeguir = async function() {
  const nombre = document.getElementById('nombreCancha').value.trim();
  if (!nombre) { showToast('⚠️ Ingresá el nombre de la cancha'); return; }

  const tels = [...document.querySelectorAll('#telefonos input')].map(i => i.value).filter(Boolean);
  const redes = [...document.querySelectorAll('.red-social input')].map(i => i.value).filter(Boolean);

  const config = {
    nombre,
    colorPrincipal:  document.getElementById('colorPrincipal').value,
    colorSecundario: document.getElementById('colorSecundario').value,
    pais:    document.getElementById('pais').value,
    moneda:  document.getElementById('moneda').value,
    zona:    document.getElementById('zona').value,
    idioma:  document.getElementById('idioma').value,
    telefonos: tels,
    redes,
    updatedAt: new Date().toISOString()
  };

  try {
    await setDoc(doc(db, 'config', 'cancha'), config);
    showToast('✓ Configuración guardada');
    setTimeout(() => {
      window.location.href = 'torneo_pantalla2.html';
    }, 1200);
  } catch(e) {
    console.error(e);
    showToast('Error al guardar');
  }
};

// ── CARGAR CONFIG GUARDADA ──
async function cargarConfig() {
  try {
    const snap = await getDoc(doc(db, 'config', 'cancha'));
    if (!snap.exists()) return;
    const c = snap.data();
    if (c.nombre) document.getElementById('nombreCancha').value = c.nombre;
    if (c.colorPrincipal)  document.getElementById('colorPrincipal').value  = c.colorPrincipal;
    if (c.colorSecundario) document.getElementById('colorSecundario').value = c.colorSecundario;
    if (c.pais)    document.getElementById('pais').value    = c.pais;
    if (c.moneda)  document.getElementById('moneda').value  = c.moneda;
    if (c.zona)    document.getElementById('zona').value    = c.zona;
    if (c.idioma)  document.getElementById('idioma').value  = c.idioma;
    if (c.telefonos) {
      const wrap = document.getElementById('telefonos');
      wrap.innerHTML = '';
      c.telefonos.forEach((t, i) => {
        const row = document.createElement('div');
        row.className = 'tel-row';
        row.innerHTML = `<span class="tel-label">TEL ${i+1}</span><input type="tel" value="${t}" placeholder="Nombre y teléfono...">`;
        wrap.appendChild(row);
      });
    }
    if (c.redes) {
      const inputs = document.querySelectorAll('.red-social input');
      c.redes.forEach((r, i) => { if (inputs[i]) inputs[i].value = r; });
    }
  } catch(e) { console.error(e); }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

window.showToast = showToast;
cargarConfig();
</script>
</body>
</html>
